# Clash Advanced Configuration Template
port: 7890
socks-port: 7891
redir-port: 7892
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090

dns:
  enable: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "localhost.ptlogin2.qq.com"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
    - tls://8.8.8.8:853
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

proxy-groups:
  - name: "Proxy"
    type: select
    proxies: ["Auto Select", "Fallback", "Load Balance", "DIRECT"]

  - name: "Auto Select"
    type: url-test
    proxies: []
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  - name: "Fallback"
    type: fallback
    proxies: []
    url: "http://www.gstatic.com/generate_204"
    interval: 300

  - name: "Load Balance"
    type: load-balance
    proxies: []
    strategy: round-robin
    url: "http://www.gstatic.com/generate_204"
    interval: 300

  - name: "Streaming"
    type: select
    proxies: ["Proxy", "Auto Select"]

  - name: "AdBlock"
    type: select
    proxies: ["REJECT", "DIRECT", "Proxy"]

rule-providers:
  reject:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: ./ruleset/reject.yaml
    interval: 86400

  direct:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt"
    path: ./ruleset/direct.yaml
    interval: 86400

  proxy:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt"
    path: ./ruleset/proxy.yaml
    interval: 86400

rules:
  - RULE-SET,reject,AdBlock
  - RULE-SET,direct,DIRECT
  - RULE-SET,proxy,Proxy
  - DOMAIN-SUFFIX,google.com,Proxy
  - DOMAIN-SUFFIX,github.com,Proxy
  - DOMAIN-KEYWORD,openai,Proxy
  - GEOIP,CN,DIRECT
  - MATCH,Proxy
